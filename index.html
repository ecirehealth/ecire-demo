/* ── Animated counter hook ── */
const useCounter = (target, duration = 1200, delay = 400) => {
  const [val, setVal] = useState(0);
  const started = useRef(false);
  useEffect(() => {
    const timer = setTimeout(() => {
      started.current = true;
      const start = performance.now();
      const tick = (now) => {
        const p = Math.min((now - start) / duration, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        setVal(Math.round(target * ease));
        if (p < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }, delay);
    return () => clearTimeout(timer);
  }, [target, duration, delay]);
  return val;
};

/* ── Animated progress bar ── */
const APB = ({ target, color, delay = 500, h = 5 }) => {
  const [w, setW] = useState(0);
  useEffect(() => { const t = setTimeout(() => setW(target), delay); return () => clearTimeout(t); }, [target, delay]);
  return (
    <div style={{ width: "100%", height: h, background: P.bgInput, borderRadius: P.r, overflow: "hidden" }}>
      <div style={{ height: "100%", width: (w * 100) + "%", background: color || P.accent + "80", borderRadius: P.r, transition: `width ${800 + delay * 0.3}ms cubic-bezier(0.25,0.46,0.45,0.94)` }} />
    </div>
  );
};

/* ── Small UI ── */

);

/* ── Scroll hint — shows when content extends below fold ── */
const ScrollHint = ({ step }) => {
  const [show, setShow] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const check = () => {
      const el = document.scrollingElement || document.documentElement;
      const scrollable = el.scrollHeight > el.clientHeight + 80;
      const nearTop = el.scrollTop < 60;
      setShow(scrollable && nearTop);
    };
    check();
    const t = setTimeout(check, 800);
    window.addEventListener("scroll", check, { passive: true });
    return () => { clearTimeout(t); window.removeEventListener("scroll", check); };
  }, [step]);
  if (!show) return null;
  return (
    <div style={{ position: "fixed", bottom: 100, right: 14, zIndex: 90, animation: "scrollBounce 2s ease infinite", pointerEvents: "none" }}>
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 1, opacity: 0.4 }}>
        <span style={{ fontSize: 12, color: P.accent }}>↓</span>
      </div>
    </div>
  );
};

/* ── Self-contained countdown (doesn't re-render parent) ── */
const Countdown = ({ duration, playing, step }) => {
  const [t, setT] = useState(duration);
  useEffect(() => { setT(duration); }, [duration, step]);
  useEffect(() => {
    if (!playing) return;
    const iv = setInterval(() => setT(p => Math.max(p - 1, 0)), 1000);
    return () => clearInterval(iv);
  }, [playing, step]);
  if (!playing) return null;
  return <span style={{ fontSize: 9, color: P.textMuted, fontFamily: sn, minWidth: 16, textAlign: "center" }}>{t}s</span>;
};

  /* Stable navigation — no dependency on step state */
  const advance = useCallback(() => {
    if (stepRef.current < STEPS.length - 1) {
      const ns = stepRef.current + 1;
      stepRef.current = ns;
      setStep(ns); setExp(null);
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      playRef.current = false; setPlaying(false);
      clearTimeout(timerRef.current);
    }
  }, []);

  const goTo = useCallback((n) => {
    clearTimeout(timerRef.current);
    const ns = Math.max(0, Math.min(n, STEPS.length - 1));
    stepRef.current = ns;
    setStep(ns); setExp(null);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, []);

  const goPrev = useCallback(() => {
    if (stepRef.current > 0) goTo(stepRef.current - 1);
  }, [goTo]);

  /* Auto-play — starts a fresh timeout whenever step or playing changes */
  useEffect(() => {
    clearTimeout(timerRef.current);
    if (!playing) return;
    timerRef.current = setTimeout(advance, STEPS[step].dur * 1000);
    return () => clearTimeout(timerRef.current);
  }, [step, playing, advance]);

  /* Keyboard */
  useEffect(() => {
    const h = (e) => {
      if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); advance(); }
      if (e.key === "ArrowLeft") { e.preventDefault(); goPrev(); }
      if (e.key === "p") { playRef.current = !playRef.current; setPlaying(p => !p); }
